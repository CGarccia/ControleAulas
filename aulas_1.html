<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aulas">
  <meta name="theme-color" content="#ffffff">
  <title>Aulas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;
      --text:#111111;--text2:#666666;--text3:#999999;
      --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
      --accent:#111111;--accent-fg:#ffffff;
      --danger:#E24B4A;
      --radius:12px;--radius-sm:8px;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#111111;--bg2:#1e1e1e;--bg3:#2a2a2a;
      --text:#f0f0f0;--text2:#999999;--text3:#666666;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
      --accent:#f0f0f0;--accent-fg:#111111;--danger:#ff6b6a;
    }}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
    .app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;}

    /* HEADER */
    .header{padding:calc(var(--safe-top) + 16px) 20px 14px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
    .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
    .header h1{font-size:24px;font-weight:500;letter-spacing:-0.5px;}
    .header-sub{font-size:13px;color:var(--text2);}
    .btn-new{background:var(--accent);color:var(--accent-fg);border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
    .btn-new:active{opacity:0.75;}

    /* TABS */
    .tabs{display:flex;padding:0 20px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:calc(var(--safe-top) + 60px);z-index:9;}
    .tab{flex:1;padding:12px 0;font-size:14px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--text2);border-bottom:2px solid transparent;}
    .tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
    .content{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:calc(var(--safe-bottom) + 24px);-webkit-overflow-scrolling:touch;}

    /* LISTA */
    .date-group{margin-bottom:22px;}
    .date-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
    .aula-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
    .aula-card:active{background:var(--bg2);}
    .aula-time{font-size:13px;color:var(--text2);min-width:42px;font-variant-numeric:tabular-nums;}
    .aula-info{flex:1;}
    .aula-studio{font-size:15px;font-weight:500;}
    .aula-actions{display:flex;gap:8px;}
    .btn-icon{background:none;border:0.5px solid var(--border);border-radius:var(--radius-sm);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text2);}
    .btn-icon:active{background:var(--bg2);}
    .btn-icon.del{color:var(--danger);border-color:var(--danger);opacity:0.6;}
    .btn-icon.del:active{opacity:1;}
    .empty-state{text-align:center;padding:80px 20px 40px;color:var(--text2);font-size:14px;line-height:1.6;}
    .empty-icon{font-size:36px;margin-bottom:12px;}

    /* FORM */
    .form-wrap{display:flex;flex-direction:column;gap:16px;}
    .form-header{margin-bottom:4px;}
    .form-title{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
    .form-subtitle{font-size:13px;color:var(--text2);margin-top:3px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:0.03em;text-transform:uppercase;}
    .field input,.field select{border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;font-family:inherit;color:var(--text);background:var(--bg2);width:100%;appearance:none;-webkit-appearance:none;}
    .field input:focus,.field select:focus{outline:none;border-color:var(--text);}
    .autofill-box{background:var(--bg2);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;}
    .autofill-box:active{background:var(--bg3);}
    .autofill-tag{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
    .autofill-text{font-size:13px;color:var(--text2);}
    .btn-save{background:var(--accent);color:var(--accent-fg);border:none;border-radius:var(--radius-sm);padding:15px;font-size:16px;font-weight:500;cursor:pointer;width:100%;font-family:inherit;margin-top:4px;}
    .btn-save:active{opacity:0.8;}
    .btn-cancel{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:15px;font-size:16px;cursor:pointer;width:100%;font-family:inherit;color:var(--text2);}
    .btn-cancel:active{background:var(--bg2);}

    /* RELATÓRIO */
    .sec-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}

    /* chips */
    .studio-picker{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .studio-chip{padding:8px 16px;font-size:13px;font-family:inherit;border:0.5px solid var(--border2);border-radius:20px;background:none;color:var(--text2);cursor:pointer;transition:all 0.15s;}
    .studio-chip.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);font-weight:500;}
    .studio-chip:active{opacity:0.7;}

    /* botões de visão */
    .rel-filter{display:flex;gap:8px;margin-bottom:20px;}
    .rel-btn{flex:1;padding:9px 6px;font-size:13px;font-family:inherit;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text2);cursor:pointer;white-space:nowrap;}
    .rel-btn.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);font-weight:500;}
    .rel-btn:active{opacity:0.7;}

    /* seletor de mês/ano */
    .month-picker{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;}
    .mp-arrow{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:0 4px;font-family:inherit;line-height:1;}
    .mp-arrow:active{color:var(--text);}
    .mp-label{font-size:15px;font-weight:500;color:var(--text);}

    /* tabela lista por dia */
    .day-table{width:100%;border-collapse:collapse;}
    .day-table thead th{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;padding:0 0 10px;text-align:left;}
    .day-table thead th:last-child{text-align:right;}
    .day-table tbody tr{border-top:0.5px solid var(--border);}
    .day-table tbody td{padding:11px 0;font-size:14px;color:var(--text);vertical-align:middle;}
    .day-table tbody td:last-child{text-align:right;font-weight:500;}
    .day-date{font-size:14px;}
    .day-weekday{font-size:12px;color:var(--text3);margin-top:1px;}
    .day-table tfoot td{padding-top:12px;border-top:0.5px solid var(--border2);font-weight:500;font-size:14px;}
    .day-table tfoot td:last-child{text-align:right;}
    .no-data{color:var(--text2);font-size:14px;text-align:center;padding:40px 0;}

    /* totalizador por estúdio */
    .studio-total-block{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .studio-total-row{display:flex;align-items:center;padding:13px 16px;border-bottom:0.5px solid var(--border);gap:12px;}
    .studio-total-row:last-child{border-bottom:none;}
    .studio-total-row.hdr,.studio-total-row.grand{background:var(--bg2);}
    .stn{font-size:14px;font-weight:500;min-width:70px;}
    .stn.lbl{font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;font-weight:500;}
    .bar-wrap{flex:1;}
    .bar-bg{height:3px;background:var(--bg3);border-radius:2px;}
    .bar-fill{height:3px;background:var(--text);border-radius:2px;}
    .stc{font-size:14px;font-weight:500;min-width:60px;text-align:right;}
    .stc.lbl{font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;font-weight:500;}

    /* períodos colapsáveis */
    .periodo-block{margin-bottom:10px;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .periodo-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;background:var(--bg);}
    .periodo-hdr:active{background:var(--bg2);}
    .periodo-title{font-size:14px;font-weight:500;}
    .periodo-sum{font-size:12px;color:var(--text2);margin-top:2px;}
    .periodo-arrow{font-size:11px;color:var(--text3);transition:transform 0.2s;display:inline-block;}
    .periodo-arrow.open{transform:rotate(180deg);}
    .periodo-body{padding:0 16px 14px;border-top:0.5px solid var(--border);display:none;}
    .periodo-body.open{display:block;}
    .studio-tbl{width:100%;border-collapse:collapse;margin-top:12px;}
    .studio-tbl th{font-size:11px;color:var(--text3);font-weight:500;text-align:right;padding-bottom:8px;letter-spacing:0.04em;}
    .studio-tbl th:first-child{text-align:left;}
    .studio-tbl td{font-size:14px;color:var(--text);padding:8px 0;border-top:0.5px solid var(--border);text-align:right;}
    .studio-tbl td:first-child{text-align:left;}
    .studio-tbl tr.tot td{font-weight:500;border-top:0.5px solid var(--border2);padding-top:10px;}

    /* TOAST */
    .toast{position:fixed;bottom:calc(var(--safe-bottom) + 24px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--accent-fg);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:100;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>Aulas</h1>
      <button class="btn-new" onclick="showForm()">+ Nova aula</button>
    </div>
    <p class="header-sub" id="header-sub">carregando...</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('lista',this)">Registro</button>
    <button class="tab" onclick="switchTab('relatorio',this)">Relatório</button>
  </div>
  <div class="content" id="main-content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const STUDIOS=['Venus','Manakai'];
const LS_KEY='aulas_data';
let aulas=[];
let nextId=1;
let editingId=null;
let currentTab='lista';
let relView='estudio';
let selectedStudios=new Set(STUDIOS);

// mês/ano do picker (lista por dia)
const now=new Date();
let pickerYear=now.getFullYear();
let pickerMonth=now.getMonth(); // 0-based

function save(){localStorage.setItem(LS_KEY,JSON.stringify({aulas,nextId}));}
function load(){
  try{const r=localStorage.getItem(LS_KEY);if(r){const d=JSON.parse(r);aulas=d.aulas||[];nextId=d.nextId||1;}}catch(e){}
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── helpers ───────────────────────────────────────────────────────────────────
function nextHourAfter(h){
  const[hh,mm]=h.split(':').map(Number);
  return `${String((hh+1)%24).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function isoWeekKey(dateStr){
  const[y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const jan4=new Date(y,0,4),s=new Date(jan4);
  s.setDate(jan4.getDate()-((jan4.getDay()+6)%7));
  const week=Math.floor((dt-s)/604800000)+1;
  const yr=week<1?y-1:(week>52&&dt>new Date(y,11,28)?y+1:y);
  const wk=week<1?isoWeekOf(new Date(y-1,11,31)):(week>52&&dt>new Date(y,11,28)?1:week);
  return `${yr}-W${String(wk).padStart(2,'0')}`;
}
function isoWeekOf(dt){
  const y=dt.getFullYear(),jan4=new Date(y,0,4),s=new Date(jan4);
  s.setDate(jan4.getDate()-((jan4.getDay()+6)%7));
  return Math.floor((dt-s)/604800000)+1;
}
function weekLabel(key){
  const[y,w]=key.split('-W');
  const jan4=new Date(Number(y),0,4),s=new Date(jan4);
  s.setDate(jan4.getDate()-((jan4.getDay()+6)%7));
  const mon=new Date(s.getTime()+(Number(w)-1)*604800000);
  const sun=new Date(mon.getTime()+6*86400000);
  const f=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  return `Semana ${w} · ${f(mon)} – ${f(sun)}`;
}
function monthKey(d){return d.slice(0,7);}
function monthLabel(k){
  const[y,m]=k.split('-');
  return new Date(Number(y),Number(m)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
}
function fmtDia(dia){
  const[y,m,d]=dia.split('-');
  const dt=new Date(Number(y),Number(m)-1,Number(d));
  const today=new Date();today.setHours(0,0,0,0);
  const ontem=new Date(today);ontem.setDate(ontem.getDate()-1);
  if(dt.getTime()===today.getTime()) return 'Hoje';
  if(dt.getTime()===ontem.getTime()) return 'Ontem';
  return dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}
function aggregateBy(keyFn,studioSet){
  const map={};
  aulas.filter(a=>studioSet.has(a.studio)).forEach(a=>{
    const k=keyFn(a.dia);
    if(!map[k]){map[k]={total:0,byStudio:{}};studioSet.forEach(s=>{map[k].byStudio[s]=0;});}
    map[k].total++;
    map[k].byStudio[a.studio]++;
  });
  return map;
}
function studioTblHTML(bs,studioSet){
  const ss=[...studioSet];
  const tot=ss.reduce((s,st)=>s+(bs[st]||0),0);
  return `<table class="studio-tbl">
    <thead><tr><th>Estúdio</th><th>Aulas</th></tr></thead>
    <tbody>
      ${ss.map(s=>`<tr><td>${s}</td><td>${bs[s]||0}</td></tr>`).join('')}
      <tr class="tot"><td>Total</td><td>${tot}</td></tr>
    </tbody>
  </table>`;
}

// ── tabs ──────────────────────────────────────────────────────────────────────
function updateSubtitle(){
  const today=new Date().toISOString().slice(0,10);
  const n=aulas.filter(a=>a.dia===today).length;
  document.getElementById('header-sub').textContent=n===0?'Nenhuma aula hoje':n===1?'1 aula hoje':n+' aulas hoje';
}
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function render(){currentTab==='lista'?renderLista():renderRelatorio();}

// ── lista ─────────────────────────────────────────────────────────────────────
function renderLista(){
  updateSubtitle();
  const sorted=[...aulas].sort((a,b)=>b.dia.localeCompare(a.dia)||a.hora.localeCompare(b.hora));
  const groups={};
  sorted.forEach(a=>{if(!groups[a.dia]) groups[a.dia]=[];groups[a.dia].push(a);});
  const dias=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  if(!dias.length){
    document.getElementById('main-content').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>Nenhuma aula registrada.<br>Toque em "+ Nova aula" para começar.</div>`;
    return;
  }
  let html='';
  dias.forEach(dia=>{
    html+=`<div class="date-group"><div class="date-label">${fmtDia(dia)}</div>`;
    groups[dia].forEach(a=>{
      html+=`<div class="aula-card">
        <span class="aula-time">${a.hora}</span>
        <div class="aula-info"><div class="aula-studio">${a.studio}</div></div>
        <div class="aula-actions">
          <button class="btn-icon" onclick="editAula(${a.id})">✎</button>
          <button class="btn-icon del" onclick="deleteAula(${a.id})">✕</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('main-content').innerHTML=html;
}

// ── relatório ─────────────────────────────────────────────────────────────────
function toggleStudio(s){
  if(selectedStudios.has(s)){if(selectedStudios.size===1) return;selectedStudios.delete(s);}
  else selectedStudios.add(s);
  renderRelatorio();
}
function setRelView(v){relView=v;renderRelatorio();}
function toggleP(id){
  const b=document.getElementById(id),a=document.getElementById('arr-'+id);
  const o=b.classList.toggle('open');a.classList.toggle('open',o);
}
function changeMonth(delta){
  pickerMonth+=delta;
  if(pickerMonth<0){pickerMonth=11;pickerYear--;}
  if(pickerMonth>11){pickerMonth=0;pickerYear++;}
  renderRelatorio();
}

function renderRelatorio(){
  const chips=STUDIOS.map(s=>`
    <button class="studio-chip ${selectedStudios.has(s)?'active':''}" onclick="toggleStudio('${s}')">${s}</button>
  `).join('');

  const filterBar=`
    <div class="rel-filter">
      <button class="rel-btn ${relView==='estudio'?'active':''}" onclick="setRelView('estudio')">Por estúdio</button>
      <button class="rel-btn ${relView==='semana'?'active':''}"  onclick="setRelView('semana')">Por semana</button>
      <button class="rel-btn ${relView==='mes'?'active':''}"     onclick="setRelView('mes')">Por mês</button>
      <button class="rel-btn ${relView==='dia'?'active':''}"     onclick="setRelView('dia')">Lista por dia</button>
    </div>`;

  let body='';

  if(relView==='estudio'){
    const filteredAulas=aulas.filter(a=>selectedStudios.has(a.studio));
    const total=filteredAulas.length;
    const byStudio={};
    STUDIOS.forEach(s=>{byStudio[s]=0;});
    filteredAulas.forEach(a=>{if(byStudio[a.studio]!==undefined) byStudio[a.studio]++;});
    const vis=[...selectedStudios];
    const maxS=Math.max(...vis.map(s=>byStudio[s]),1);
    const rows=vis.map(s=>`
      <div class="studio-total-row">
        <span class="stn">${s}</span>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(byStudio[s]/maxS*100)}%"></div></div></div>
        <span class="stc">${byStudio[s]} aula${byStudio[s]!==1?'s':''}</span>
      </div>`).join('');
    body=`<div class="studio-total-block">
      <div class="studio-total-row hdr">
        <span class="stn lbl">Estúdio</span><div class="bar-wrap"></div><span class="stc lbl">Aulas</span>
      </div>
      ${rows}
      <div class="studio-total-row grand">
        <span class="stn">Total</span><div class="bar-wrap"></div>
        <span class="stc">${total} aula${total!==1?'s':''}</span>
      </div>
    </div>`;

  } else if(relView==='semana'||relView==='mes'){
    const keyFn=relView==='semana'?isoWeekKey:monthKey;
    const labelFn=relView==='semana'?weekLabel:monthLabel;
    const map=aggregateBy(keyFn,selectedStudios);
    const keys=Object.keys(map).sort((a,b)=>b.localeCompare(a));
    if(!keys.length){
      body='<p class="no-data">Nenhum dado para exibir.</p>';
    } else {
      body=keys.map((k,i)=>{
        const p=map[k],id='p'+i;
        return `<div class="periodo-block">
          <div class="periodo-hdr" onclick="toggleP('${id}')">
            <div>
              <div class="periodo-title">${labelFn(k)}</div>
              <div class="periodo-sum">${p.total} aula${p.total!==1?'s':''}</div>
            </div>
            <span class="periodo-arrow" id="arr-${id}">▾</span>
          </div>
          <div class="periodo-body" id="${id}">${studioTblHTML(p.byStudio,selectedStudios)}</div>
        </div>`;
      }).join('');
    }

  } else if(relView==='dia'){
    // lista por dia — filtrada por estúdios selecionados e mês/ano do picker
    const yStr=String(pickerYear);
    const mStr=String(pickerMonth+1).padStart(2,'0');
    const prefix=`${yStr}-${mStr}`;
    const pickerLbl=new Date(pickerYear,pickerMonth,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

    // agrupa aulas do mês filtradas pelos estúdios
    const dayMap={};
    aulas
      .filter(a=>selectedStudios.has(a.studio)&&a.dia.startsWith(prefix))
      .forEach(a=>{
        if(!dayMap[a.dia]) dayMap[a.dia]=0;
        dayMap[a.dia]++;
      });

    const days=Object.keys(dayMap).sort();
    const totalMes=days.reduce((s,d)=>s+dayMap[d],0);

    const pickerHTML=`
      <div class="month-picker">
        <button class="mp-arrow" onclick="changeMonth(-1)">‹</button>
        <span class="mp-label">${pickerLbl}</span>
        <button class="mp-arrow" onclick="changeMonth(1)">›</button>
      </div>`;

    if(!days.length){
      body=pickerHTML+'<p class="no-data">Sem aulas neste mês.</p>';
    } else {
      const rows=days.map(d=>{
        const[y,m,dd]=d.split('-');
        const dt=new Date(Number(y),Number(m)-1,Number(dd));
        const dateStr=dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
        const weekday=dt.toLocaleDateString('pt-BR',{weekday:'long'});
        return `<tr>
          <td>
            <div class="day-date">${dateStr}</div>
            <div class="day-weekday">${weekday}</div>
          </td>
          <td>${dayMap[d]} aula${dayMap[d]!==1?'s':''}</td>
        </tr>`;
      }).join('');

      body=pickerHTML+`
        <table class="day-table">
          <thead><tr><th>Data</th><th style="text-align:right">Aulas</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr><td>Total do mês</td><td>${totalMes} aula${totalMes!==1?'s':''}</td></tr></tfoot>
        </table>`;
    }
  }

  document.getElementById('main-content').innerHTML=`
    <div class="sec-label">Estúdios</div>
    <div class="studio-picker">${chips}</div>
    ${filterBar}
    ${body}`;
}

// ── form ──────────────────────────────────────────────────────────────────────
function getLastAula(){return aulas.length?[...aulas].sort((a,b)=>b.id-a.id)[0]:null;}
function showForm(id=null){
  editingId=id;
  const existing=id?aulas.find(a=>a.id===id):null;
  const last=getLastAula();
  const today=new Date().toISOString().slice(0,10);
  const nowH=String(new Date().getHours()).padStart(2,'0')+':00';
  const dia=existing?.dia||today;
  const hora=existing?.hora||nowH;
  const studio=existing?.studio||(last?.studio||STUDIOS[0]);
  const sugHora=last?nextHourAfter(last.hora):null;
  const autofill=!existing&&last?`
    <div>
      <div class="autofill-tag">Sugestão</div>
      <div class="autofill-box" onclick="applyAutofill()">
        <div class="autofill-text">Próxima aula — ${sugHora} · ${last.studio}</div>
      </div>
    </div>`:'';
  document.getElementById('main-content').innerHTML=`
    <div class="form-header">
      <div class="form-title">${existing?'Editar aula':'Nova aula'}</div>
      <div class="form-subtitle">${existing?'Atualize os dados abaixo':'Preencha os dados da aula'}</div>
    </div>
    <div class="form-wrap">
      ${autofill}
      <div class="field"><label>Data</label><input type="date" id="f-dia" value="${dia}"></div>
      <div class="field"><label>Hora de início</label><input type="time" id="f-hora" value="${hora}"></div>
      <div class="field"><label>Estúdio</label>
        <select id="f-studio">${STUDIOS.map(s=>`<option value="${s}"${s===studio?' selected':''}>${s}</option>`).join('')}</select>
      </div>
      <button class="btn-save" onclick="saveAula()">Salvar aula</button>
      <button class="btn-cancel" onclick="render()">Cancelar</button>
    </div>`;
}
function applyAutofill(){
  const last=getLastAula();if(!last) return;
  document.getElementById('f-hora').value=nextHourAfter(last.hora);
  document.getElementById('f-studio').value=last.studio;
  toast('Sugestão aplicada!');
}
function saveAula(){
  const dia=document.getElementById('f-dia').value;
  const hora=document.getElementById('f-hora').value;
  const studio=document.getElementById('f-studio').value;
  if(!dia||!hora||!studio){toast('Preencha todos os campos.');return;}
  if(editingId){Object.assign(aulas.find(x=>x.id===editingId),{dia,hora,studio});toast('Aula atualizada!');}
  else{aulas.push({id:nextId++,dia,hora,studio});toast('Aula registrada!');}
  save();
  currentTab='lista';
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.querySelectorAll('.tab')[1].classList.remove('active');
  render();
}
function editAula(id){showForm(id);}
function deleteAula(id){
  if(!confirm('Excluir esta aula?')) return;
  aulas=aulas.filter(a=>a.id!==id);
  save();render();toast('Aula excluída.');
}

load();
render();
</script>
</body>
</html>
